<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maize Quality & Risk Analyzer | Nhambe DB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Hero Section -->
  <section class="text-center py-16 bg-gradient-to-b from-green-600 to-green-200">
    <h1 class="text-4xl font-bold text-white mb-2">Maize Quality & Risk Analyzer</h1>
    <p class="text-green-100 text-xl">Dashboard and report analyzing maize quality and identifying risk factors affecting yield.</p>
  </section>

  <!-- Content Section -->
  <section class="max-w-5xl mx-auto my-12 px-4 space-y-12">

    <!-- Dashboard Screenshot -->
    <div class="bg-white shadow-lg rounded-xl p-6">
      <h2 class="text-2xl font-semibold mb-4 text-green-800">Dashboard Screenshot</h2>
      <img src="projects/maize-dashboard.png" alt="Maize Dashboard" class="w-full rounded-lg shadow-md">
    </div>

    <!-- Project Report -->
    <div class="bg-white shadow-lg rounded-xl p-6">
      <h2 class="text-2xl font-semibold mb-4 text-green-800">Project Report</h2>
      <iframe src="projects/maize-report.pdf" class="w-full h-[600px] rounded-lg border" frameborder="0"></iframe>
    </div>

    <!-- Back Button -->
    <div class="text-center">
      <a href="projects.html" class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700 transition">Back to Projects</a>
    </div>

  </section>

  <!-- Footer -->
  <footer class="text-center py-6 text-green-700 font-medium">
    Designed and Developed by Nhambe DB
  </footer>

</body>
</html>
