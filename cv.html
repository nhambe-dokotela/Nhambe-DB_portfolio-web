<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV | Nhambe DB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Hero Section -->
  <section class="text-center py-16 bg-gradient-to-b from-green-600 to-green-200">
    <h1 class="text-4xl font-bold text-white mb-2">Curriculum Vitae</h1>
    <p class="text-green-100 text-xl">View my professional experience and qualifications</p>
  </section>

  <!-- CV Viewer -->
  <section class="max-w-5xl mx-auto my-12 px-4">

    <div class="bg-white shadow-lg rounded-xl p-4">
      <iframe 
        src="cv.[1]pdf" 
        class="w-full h-[800px] rounded-lg border"
        frameborder="0">
      </iframe>
    </div>

    <!-- Download Button (optional but recommended) -->
    <div class="text-center mt-6">
      <a href="cv.pdf" target="_blank" class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700 transition">
        Download CV
      </a>
    </div>

    <!-- Back Button -->
    <div class="text-center mt-4">
      <a href="index.html" class="text-green-700 hover:underline">← Back to Home</a>
    </div>

  </section>

  <!-- Footer -->
  <footer class="text-center py-6 text-green-700 font-medium">
    Designed and Developed by Nhambe DB
  </footer>

</body>
</html>
